<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Lexie — Learn Malayalam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam:wght@400;600;700&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --surface: #1c2333;
    --gold: #f0c060;
    --gold2: #e8a030;
    --cream: #fdf6e3;
    --text: #e6edf3;
    --muted: #8b949e;
    --radius: 24px;
    --card-w: min(380px, 92vw);
    --card-h: min(520px, 72vh);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,192,96,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(99,179,237,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ════════════════════════════════
     SCREENS
  ════════════════════════════════ */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 24px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
  }

  /* ════════════════════════════════
     HOME SCREEN
  ════════════════════════════════ */
  .home-card {
    background: var(--surface);
    border: 1px solid rgba(240,192,96,0.15);
    border-radius: 32px;
    padding: 44px 40px 40px;
    width: min(440px, 100%);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    animation: floatIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }

  .home-logo {
    font-size: 48px;
    text-align: center;
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  .home-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 6px;
  }

  .home-sub {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 36px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .home-sub span {
    color: var(--gold);
    font-weight: 500;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .count-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .count-btn {
    background: var(--bg2);
    border: 1.5px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .count-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .count-btn span { position: relative; z-index: 1; }
  .count-btn:hover { border-color: rgba(240,192,96,0.3); color: var(--text); }
  .count-btn.selected {
    border-color: var(--gold);
    color: var(--bg);
    font-weight: 700;
  }
  .count-btn.selected::after { opacity: 1; }

  .start-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #0d1117;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s;
    box-shadow: 0 8px 32px rgba(240,192,96,0.35);
  }
  .start-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(240,192,96,0.45);
  }
  .start-btn:active:not(:disabled) { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }
  .stat-chip {
    flex: 1;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-chip .stat-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    display: block;
  }
  .stat-chip .stat-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  /* ════════════════════════════════
     SESSION SCREEN
  ════════════════════════════════ */
  .session-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: env(safe-area-inset-top, 12px) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
  }

  .back-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { color: var(--text); background: rgba(255,255,255,0.1); }

  .progress-wrap {
    flex: 1;
    margin: 0 16px;
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .card-counter {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    min-width: 44px;
    text-align: right;
  }

  .card-area {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100dvh;
  }

  /* ── Flashcard ── */
  .flashcard-wrap {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 1200px;
    cursor: pointer;
    position: relative;
  }

  .flashcard-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--radius);
  }
  .flashcard-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Front */
  .card-front {
    background: linear-gradient(145deg, #1e2940 0%, #16213e 50%, #0f1b35 100%);
    border: 1px solid rgba(240,192,96,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .card-badge {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(240,192,96,0.12);
    border: 1px solid rgba(240,192,96,0.25);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .card-front-deco {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,96,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-front-deco2 {
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(99,179,237,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-malayalam {
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-size: clamp(48px, 12vw, 72px);
    font-weight: 700;
    color: var(--cream);
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 2px 20px rgba(240,192,96,0.2);
    margin-bottom: 16px;
  }

  .card-phonetic {
    font-size: 18px;
    font-weight: 300;
    color: rgba(240,192,96,0.75);
    letter-spacing: 0.06em;
    margin-bottom: 32px;
    font-style: italic;
  }

  .speak-btn {
    background: rgba(240,192,96,0.12);
    border: 1.5px solid rgba(240,192,96,0.3);
    border-radius: 50%;
    width: 54px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--gold);
    font-size: 22px;
    position: relative;
    z-index: 5;
    margin-bottom: 28px;
  }
  .speak-btn:hover { background: rgba(240,192,96,0.2); transform: scale(1.08); }
  .speak-btn.speaking { animation: speakPulse 0.6s ease-in-out infinite alternate; }
  @keyframes speakPulse {
    from { box-shadow: 0 0 0 0 rgba(240,192,96,0.4); }
    to   { box-shadow: 0 0 0 12px rgba(240,192,96,0); }
  }

  .card-hint {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: absolute;
    bottom: 22px;
  }

  /* Back */
  .card-back {
    background: var(--cream);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.04);
  }

  .card-image-wrap {
    flex: 0 0 58%;
    position: relative;
    overflow: hidden;
    border-radius: var(--radius) var(--radius) 0 0;
    background: #c8c0b0;
  }

  .card-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }
  .card-image:hover { transform: scale(1.03); }

  .card-image-fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: linear-gradient(145deg, #1e2940, #0f1b35);
    color: var(--cream);
    text-align: center;
    padding: 20px;
  }
  .card-image-fallback .fb-mal {
    font-family: 'Noto Sans Malayalam', sans-serif;
    font-size: 42px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card-image-fallback .fb-ph {
    font-size: 14px;
    color: rgba(240,192,96,0.7);
    font-style: italic;
  }

  .card-back-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 24px 24px;
  }

  .meaning-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 8px;
  }

  .meaning-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 700;
    color: #1a1a2e;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .meaning-phonetic {
    font-size: 14px;
    color: #8b949e;
    font-style: italic;
    margin-bottom: 0;
  }

  .card-continue-hint {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #bbb;
    position: absolute;
    bottom: 18px;
  }

  /* Entry/exit animation */
  .flashcard-wrap {
    animation: cardEnter 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)   scale(1); }
  }
  .flashcard-wrap.exiting {
    animation: cardExit 0.35s cubic-bezier(0.4,0,1,1) both;
  }
  @keyframes cardExit {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-30px) scale(0.95); }
  }

  /* ════════════════════════════════
     DONE SCREEN
  ════════════════════════════════ */
  .done-card {
    background: var(--surface);
    border: 1px solid rgba(240,192,96,0.15);
    border-radius: 32px;
    padding: 48px 36px 40px;
    width: min(420px, 100%);
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: floatIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  .done-emoji { font-size: 56px; margin-bottom: 16px; display: block; }

  .done-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .done-sub {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .done-stats {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }
  .done-stat {
    flex: 1;
    background: var(--bg2);
    border-radius: 16px;
    padding: 16px 10px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .done-stat .ds-val {
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    display: block;
  }
  .done-stat .ds-lbl {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .done-btns { display: flex; flex-direction: column; gap: 12px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #0d1117;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 24px rgba(240,192,96,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(240,192,96,0.4); }

  .btn-secondary {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { color: var(--text); background: rgba(255,255,255,0.08); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confettiFall linear both;
    z-index: 99;
    pointer-events: none;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  @media (max-height: 680px) {
    :root { --card-h: 88vw; }
    .home-card { padding: 28px 24px 28px; }
    .home-logo { font-size: 36px; margin-bottom: 4px; }
    .home-title { font-size: 34px; }
  }
</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div id="homeScreen" class="screen">
  <div class="home-card">
    <div class="home-logo">🌸</div>
    <h1 class="home-title">Lexie</h1>
    <p class="home-sub">Your personal Malayalam tutor — made with love <span>♥</span></p>

    <p class="section-label">How many cards today?</p>
    <div class="count-grid" id="countGrid">
      <button class="count-btn" onclick="selectCount(5)"><span>5</span></button>
      <button class="count-btn" onclick="selectCount(10)"><span>10</span></button>
      <button class="count-btn" onclick="selectCount(15)"><span>15</span></button>
      <button class="count-btn" onclick="selectCount(20)"><span>20</span></button>
      <button class="count-btn" onclick="selectCount(25)"><span>25</span></button>
      <button class="count-btn" onclick="selectCount(30)"><span>30</span></button>
    </div>

    <button class="start-btn" id="startBtn" onclick="startSession()" disabled>
      Start Learning →
    </button>

    <div class="stats-row">
      <div class="stat-chip">
        <span class="stat-val" id="statSeen">0</span>
        <span class="stat-lbl">Words seen</span>
      </div>
      <div class="stat-chip">
        <span class="stat-val" id="statTotal">200</span>
        <span class="stat-lbl">Total words</span>
      </div>
      <div class="stat-chip">
        <span class="stat-val" id="statPct">0%</span>
        <span class="stat-lbl">Progress</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ SESSION SCREEN ══ -->
<div id="sessionScreen" class="screen hidden">
  <div class="session-header">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="card-counter" id="cardCounter">1 / 10</div>
  </div>
  <div class="card-area">
    <div id="cardContainer"></div>
  </div>
</div>

<!-- ══ DONE SCREEN ══ -->
<div id="doneScreen" class="screen hidden">
  <div class="done-card">
    <span class="done-emoji">🎉</span>
    <div class="done-title">Well done!</div>
    <p class="done-sub" id="doneSub">You completed your session. Keep it up!</p>
    <div class="done-stats">
      <div class="done-stat">
        <span class="ds-val" id="doneCards">0</span>
        <span class="ds-lbl">Cards done</span>
      </div>
      <div class="done-stat">
        <span class="ds-val" id="doneSeen">0</span>
        <span class="ds-lbl">Total seen</span>
      </div>
      <div class="done-stat">
        <span class="ds-val" id="donePct">0%</span>
        <span class="ds-lbl">Progress</span>
      </div>
    </div>
    <div class="done-btns">
      <button class="btn-primary" onclick="goAgain()">Go Again 🔄</button>
      <button class="btn-secondary" onclick="goHome()">← Back to Home</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  WORD DATABASE  (200 Level-1 Malayalam words)
// ════════════════════════════════════════════════════════
const WORDS = [
  // Greetings & Phrases
  { id:"1",  malayalam:"നമസ്കാരം",   phonetic:"Namaskaram",    meaning:"Hello / Greeting",      imageUrl:"https://images.unsplash.com/photo-1590402444521-0e95690f04e1?w=600&auto=format&fit=crop" },
  { id:"2",  malayalam:"നന്ദി",       phonetic:"Nandi",          meaning:"Thank You",             imageUrl:"https://images.unsplash.com/photo-1607748862156-7c548e7e98f4?w=600&auto=format&fit=crop" },
  { id:"3",  malayalam:"ശരി",         phonetic:"Shari",          meaning:"Okay / Right",          imageUrl:"https://images.unsplash.com/photo-1553877522-43269d4ea984?w=600&auto=format&fit=crop" },
  { id:"4",  malayalam:"അതെ",         phonetic:"Athe",           meaning:"Yes",                   imageUrl:"https://images.unsplash.com/photo-1543269865-cbf427effbad?w=600&auto=format&fit=crop" },

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveProgress(progress) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch {}
}

function markWordsSeen(wordIds) {
  const progress = loadProgress();
  const now = new Date().toISOString();
  wordIds.forEach(id => {
    progress[id] = { seen: true, lastSeen: now };
  });
  saveProgress(progress);
}

// ════════════════════════════════════════════════════════
//  70/30 DECK LOGIC
// ════════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCardDeck(requestedCount, progress) {
  const seenIds = new Set(Object.keys(progress).filter(k => progress[k].seen));
  const seen = WORDS.filter(w => seenIds.has(w.id));
  const unseen = WORDS.filter(w => !seenIds.has(w.id));

  if (seen.length === 0) {
    return shuffle(unseen).slice(0, requestedCount);
  }

  let newCount = Math.round(requestedCount * 0.30);
  let seenCount = requestedCount - newCount;

  if (unseen.length < newCount) {
    newCount = unseen.length;
    seenCount = requestedCount - newCount;
  }
  if (seen.length < seenCount) {
    seenCount = seen.length;
  }

  const newCards  = shuffle(unseen).slice(0, newCount);
  const seenCards = shuffle(seen).slice(0, seenCount);
  return shuffle([...newCards, ...seenCards]);
}

// ════════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════════
let selectedCount = null;
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let isSpeaking = false;

// ════════════════════════════════════════════════════════
//  HOME SCREEN
// ════════════════════════════════════════════════════════
function updateHomeStats() {
  const progress = loadProgress();
  const seenCount = Object.values(progress).filter(p => p.seen).length;
  const total = WORDS.length;
  document.getElementById('statSeen').textContent = seenCount;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPct').textContent = Math.round((seenCount / total) * 100) + '%';
}

function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('startBtn').disabled = false;
}

function startSession() {
  if (!selectedCount) return;
  const progress = loadProgress();
  deck = getCardDeck(selectedCount, progress);
  currentIndex = 0;
  showScreen('sessionScreen');
  renderCard();
}

// ════════════════════════════════════════════════════════
//  SESSION
// ════════════════════════════════════════════════════════
function updateProgress() {
  const pct = (currentIndex / deck.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('cardCounter').textContent = (currentIndex + 1) + ' / ' + deck.length;
}

function renderCard() {
  isFlipped = false;
  updateProgress();
  const word = deck[currentIndex];
  const container = document.getElementById('cardContainer');

  // Remove old card
  const old = container.querySelector('.flashcard-wrap');
  if (old) {
    old.classList.add('exiting');
    setTimeout(() => old.remove(), 350);
  }

  setTimeout(() => {
    const wrap = document.createElement('div');
    wrap.className = 'flashcard-wrap';
    wrap.innerHTML = `
      <div class="flashcard-inner" id="cardInner">
        <!-- FRONT -->
        <div class="card-face card-front" id="cardFront">
          <div class="card-front-deco"></div>
          <div class="card-front-deco2"></div>
          <div class="card-badge">Card ${currentIndex + 1}</div>
          <div class="card-malayalam">${word.malayalam}</div>
          <div class="card-phonetic">${word.phonetic}</div>
          <button class="speak-btn" id="speakBtn" onclick="speakWord(event, '${word.malayalam.replace(/'/g, "\\'")}')">🔊</button>
          <div class="card-hint">Tap anywhere to reveal</div>
        </div>
        <!-- BACK -->
        <div class="card-face card-back" id="cardBack">
          <div class="card-image-wrap">
            <img class="card-image" src="${word.imageUrl}" alt="${word.meaning}"
              onload="this.style.opacity=1"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              style="opacity:0;transition:opacity 0.4s;">
            <div class="card-image-fallback">
              <div class="fb-mal">${word.malayalam}</div>
              <div class="fb-ph">${word.phonetic}</div>
            </div>
          </div>
          <div class="card-back-body">
            <div class="meaning-label">Meaning</div>
            <div class="meaning-text">${word.meaning}</div>
            <div class="meaning-phonetic">${word.phonetic}</div>
          </div>
          <div class="card-continue-hint">Tap to continue →</div>
        </div>
      </div>
    `;

    wrap.addEventListener('click', handleCardClick);
    container.appendChild(wrap);

    // Auto-speak on card load (slight delay)
    setTimeout(() => speakWordAuto(word.malayalam), 600);
  }, old ? 300 : 0);
}

function handleCardClick(e) {
  // Don't flip if tapping the speak button
  if (e.target.closest('.speak-btn')) return;

  if (!isFlipped) {
    // Flip to back
    isFlipped = true;
    document.getElementById('cardInner').classList.add('flipped');
    markWordsSeen([deck[currentIndex].id]);
  } else {
    // Advance
    setTimeout(advanceCard, 280);
  }
}

function advanceCard() {
  if (currentIndex < deck.length - 1) {
    currentIndex++;
    renderCard();
  } else {
    showDoneScreen();
  }
}

// ════════════════════════════════════════════════════════
//  TEXT TO SPEECH
//  Strategy:
//   1. Preferred: Google Translate TTS fetched via fetch()
//      then played as a Blob URL — this sidesteps CORS on
//      the Audio element while still getting real Malayalam.
//   2. Fallback: Web Speech API with lang=ml-IN (works on
//      Android Chrome & some desktop browsers that ship a
//      Malayalam voice).
//   3. Last resort: Web Speech API with no voice set but
//      lang forced — better than English default.
// ════════════════════════════════════════════════════════

// Single reusable audio element
const ttsAudio = document.createElement('audio');
ttsAudio.style.display = 'none';
document.body.appendChild(ttsAudio);

let currentSpeakBtn = null;

function setSpeaking(btn, on) {
  isSpeaking = on;
  if (currentSpeakBtn) currentSpeakBtn.classList.remove('speaking');
  if (on && btn) { btn.classList.add('speaking'); currentSpeakBtn = btn; }
  else currentSpeakBtn = null;
}

function speakWordAuto(text) {
  speakMalayalam(text, null);
}

function speakWord(e, text) {
  e.stopPropagation();
  speakMalayalam(text, e.currentTarget);
}

async function speakMalayalam(text, btn) {
  // Stop anything currently playing
  ttsAudio.pause();
  ttsAudio.src = '';
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  setSpeaking(btn, false);

  // ── Option 1: fetch Google TTS as a blob ──────────────
  // Google Translate TTS returns real Malayalam audio.
  // We fetch it as a blob to avoid the CORS restriction
  // that blocks Audio.src when the file is opened locally.
  const encoded = encodeURIComponent(text);
  const ttsUrl = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ml&client=gtx&q=${encoded}`;

  try {
    const response = await fetch(ttsUrl);
    if (!response.ok) throw new Error('TTS fetch failed');
    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);

    setSpeaking(btn, true);
    ttsAudio.src = blobUrl;
    ttsAudio.onended = () => { setSpeaking(btn, false); URL.revokeObjectURL(blobUrl); };
    ttsAudio.onerror = () => { setSpeaking(btn, false); URL.revokeObjectURL(blobUrl); webSpeechFallback(text, btn); };
    await ttsAudio.play();
    return;
  } catch (_) {
    // fetch blocked (e.g. opened as file:// without CORS headers) → fall through
  }

  // ── Option 2: Web Speech API with Malayalam voice ─────
  webSpeechFallback(text, btn);
}

function webSpeechFallback(text, btn) {
  if (!window.speechSynthesis) return;

  const voices = window.speechSynthesis.getVoices();
  // Look for any voice whose lang starts with 'ml'
  const mlVoice = voices.find(v => v.lang.toLowerCase().startsWith('ml'));

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ml-IN';
  utt.rate = 0.82;
  if (mlVoice) utt.voice = mlVoice;

  setSpeaking(btn, true);
  utt.onend   = () => setSpeaking(btn, false);
  utt.onerror = () => setSpeaking(btn, false);
  window.speechSynthesis.speak(utt);
}

// Prime the voice list (browsers load it async)
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ════════════════════════════════════════════════════════
//  DONE SCREEN
// ════════════════════════════════════════════════════════
function showDoneScreen() {
  const progress = loadProgress();
  const seenCount = Object.values(progress).filter(p => p.seen).length;
  const pct = Math.round((seenCount / WORDS.length) * 100);

  document.getElementById('doneCards').textContent = deck.length;
  document.getElementById('doneSeen').textContent = seenCount;
  document.getElementById('donePct').textContent = pct + '%';

  const msgs = [
    "Great work! Every card brings you closer to fluency. 🌸",
    "Fantastic session! Malayalam is becoming part of you. 💫",
    "You're doing amazing! Keep going! 🎊",
    "Wonderful! She'd be so proud of you learning this! ❤️"
  ];
  document.getElementById('doneSub').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  showScreen('doneScreen');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#f0c060','#e8a030','#63b3ed','#68d391','#fc8181','#b794f4'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (6 + Math.random() * 6) + 'px';
    p.style.height = (6 + Math.random() * 6) + 'px';
    p.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    p.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

// ════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id === 'homeScreen') {
    updateHomeStats();
  }
}

function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  selectedCount = null;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('startBtn').disabled = true;
  showScreen('homeScreen');
}

function goAgain() {
  const progress = loadProgress();
  deck = getCardDeck(deck.length, progress);
  currentIndex = 0;
  showScreen('sessionScreen');
  renderCard();
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
updateHomeStats();
</script>
